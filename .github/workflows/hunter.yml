name: Bangkok Flight Hunter (Google Signal Version)

on:
  workflow_dispatch:      # 깃허브에서 직접 수동으로 돌릴 때
  repository_dispatch:    # 구글 앱스 스크립트가 30분마다 찌를 때
    types: [manual_signal]

jobs:
  hunt:
    runs-on: ubuntu-latest
    # 한국 시간(KST)으로 맞춰서 시트에 예쁘게 찍히게 하는 마법의 한 줄!
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests click tabulate gspread oauth2client

      - name: Search Google Flights
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GSPREAD_SERVICE_ACCOUNT: ${{ secrets.GSPREAD_SERVICE_ACCOUNT }}
          SERPAPI_KEY_1: ${{ secrets.SERPAPI_KEY_1 }}
          SERPAPI_KEY_2: ${{ secrets.SERPAPI_KEY_2 }}
          SERPAPI_KEY_3: ${{ secrets.SERPAPI_KEY_3 }}
          SERPAPI_KEY_4: ${{ secrets.SERPAPI_KEY_4 }}
        # 출발일과 도착일이 맞는지 한 번 더 확인해 주세요!
        run: |
          python flight_pricer.py search --depart 2026-06-03 --return 2026-06-08
