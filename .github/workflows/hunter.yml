name: Nhatrang Flight Hunter

on:
  schedule:
    - cron: '0 */4 * * *' # 4시간마다 한 번씩 실행
  workflow_dispatch:      # 원할 때 수동으로도 실행 가능

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests click pyyaml tabulate

      - name: Create Config
        run: |
          mkdir -p ~/.config/flight-pricer
          echo "api_key: ${{ secrets.DUFFEL_TOKEN }}" > ~/.config/flight-pricer/config.yaml

      - name: Test Telegram Connection
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python test_telegram.py

      - name: Search Flights
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # 10월 20일~25일 일정을 예시로 검색 (날짜는 원하시는 대로 수정 가능)
          python flight_pricer.py search --depart 2026-10-20 --return 2026-10-25
