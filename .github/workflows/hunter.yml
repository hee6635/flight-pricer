name: Bangkok Flight Hunter (High Speed)

on:
  schedule:
    - cron: '*/30 * * * *' # 30분마다 한 번씩 실행 (초정밀 감시)
  workflow_dispatch:      # 즉시 실행 버튼

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests click tabulate

      - name: Search Google Flights
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          # 1번부터 8번 키까지 모두 대응 가능하도록 설정
          SERPAPI_KEY_1: ${{ secrets.SERPAPI_KEY_1 }}
          SERPAPI_KEY_2: ${{ secrets.SERPAPI_KEY_2 }}
          SERPAPI_KEY_3: ${{ secrets.SERPAPI_KEY_3 }}
          SERPAPI_KEY_4: ${{ secrets.SERPAPI_KEY_4 }}
          SERPAPI_KEY_5: ${{ secrets.SERPAPI_KEY_5 }}
          SERPAPI_KEY_6: ${{ secrets.SERPAPI_KEY_6 }}
          SERPAPI_KEY_7: ${{ secrets.SERPAPI_KEY_7 }}
          SERPAPI_KEY_8: ${{ secrets.SERPAPI_KEY_8 }}
        run: |
          # 이미지 조건: 부산-방콕, 6/3 ~ 6/8
          python flight_pricer.py search --depart 2026-06-03 --return 2026-06-08
